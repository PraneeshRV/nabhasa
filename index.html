<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Nabhasa — pilot a craft through a neutron-star system. A WebGPU flight experience."
    />
    <title>Nabhasa</title>
    <style>
      html { background: #000; }
      html, body, #root { height: 100%; margin: 0; overflow: hidden; }

      /* Task 15 a11y floor — global, so it covers the ENGAGE buttons and every
         interactive element without per-component work. --star-hot is the one
         accent sanctioned for UI (art-direction.md). */
      :focus-visible {
        outline: 2px solid #AFE3FF; /* --star-hot: high-contrast focus ring */
        outline-offset: 3px;
        border-radius: 2px;
      }

      /* Respect prefers-reduced-motion everywhere. Kills CSS transitions (the
         preloader opacity fades) under the query. Reduced-motion users normally
         land on the static tier; this is defense-in-depth for any live-tier
         motion. JS motion (Craft.tsx gsap flash) is gated at its call site. */
      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
